  <script src="/_sdk/e063511df281944a.editing_sdk.js" integrity="sha512-Xa8p4aPfoMxVnzxQE2WAG0FfoaPLxdjOJMfUZGm1yZosJTYmnNDvgLkJ2EoN0i3zxjeQVAzUMSXNvTKQVqbXyQ=="></script>
  <script>
    let allData = [];
    let activeTab = 'all';
    const entriesEl = document.getElementById('entries');
    const emptyEl = document.getElementById('empty-state');
    const limitEl = document.getElementById('limit-warning');
    const form = document.getElementById('add-form');
    const template = document.getElementById('entry-template');
    const catEmoji = { film:'🎬', müzik:'🎵', kitap:'📚', notlar:'📝', bilim:'🔬', felsefe:'🤔', psikoloji:'🧠' };

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        btn.classList.add('tab-active');
        activeTab = btn.dataset.cat;
        renderEntries();
      });
    });

    function getFiltered() {
      if (activeTab === 'all') return allData;
      return allData.filter(d => d.category === activeTab);
    }

    function renderEntries() {
      const filtered = getFiltered();
      entriesEl.innerHTML = '';
      if (filtered.length === 0) { emptyEl.classList.remove('hidden'); } else {
        emptyEl.classList.add('hidden');
        filtered.sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''));
        filtered.forEach(item => {
          const clone = template.content.cloneNode(true);
          clone.querySelector('[data-template-id="entry-badge"]').textContent = (catEmoji[item.category]||'')+' '+(item.category||'');
          clone.querySelector('[data-template-id="entry-title"]').textContent = item.title||'';
          clone.querySelector('[data-template-id="entry-content"]').textContent = item.content||'';
          const d = item.created_at ? new Date(item.created_at) : null;
          clone.querySelector('[data-template-id="entry-date"]').textContent = d ? d.toLocaleDateString('tr-TR') : '';
          const delBtn = clone.querySelector('.delete-btn');
          const confirmDiv = clone.querySelector('.confirm-delete');
          delBtn.addEventListener('click', (e) => { e.stopPropagation(); confirmDiv.classList.remove('hidden'); });
          clone.querySelector('.confirm-no').addEventListener('click', () => confirmDiv.classList.add('hidden'));
          clone.querySelector('.confirm-yes').addEventListener('click', async function() {
            this.disabled = true; this.textContent = '...';
            await window.dataSdk.delete(item);
          });
          entriesEl.appendChild(clone);
        });
      }
      lucide.createIcons();
    }

    // Notes
    const notesTextarea = document.getElementById('notes-textarea');
    const notesSaveBtn = document.getElementById('notes-save');
    notesSaveBtn.addEventListener('click', async () => {
      const c = notesTextarea.value.trim();
      if (!c) return;
      notesSaveBtn.disabled = true; notesSaveBtn.textContent = '...';
      const res = await window.dataSdk.create({ category:'notlar', title:'Not - '+new Date().toLocaleDateString('tr-TR'), link:'', content:c, created_at:new Date().toISOString() });
      if (res.isOk) { notesTextarea.value = ''; notesSaveBtn.textContent = '✓'; } else { notesSaveBtn.textContent = '✗'; }
      setTimeout(() => { notesSaveBtn.disabled = false; notesSaveBtn.textContent = 'Kaydet'; }, 1500);
    });

    // Add form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (allData.length >= 999) { limitEl.classList.remove('hidden'); return; }
      const btn = form.querySelector('[data-template-id="submit-btn"]');
      btn.disabled = true; btn.style.opacity = '0.5';
      const title = document.getElementById('link-input').value.trim();
      const record = { category:document.getElementById('cat-select').value, title, link:title, content:document.getElementById('content-input').value.trim(), created_at:new Date().toISOString() };
      const res = await window.dataSdk.create(record);
      btn.disabled = false; btn.style.opacity = '1';
      if (res.isOk) form.reset();
    });

    // Search
    document.getElementById('top-search').addEventListener('keypress', (e) => { if (e.key==='Enter') { const q=e.target.value.trim(); if(q){window.open('https://duckduckgo.com/?q='+encodeURIComponent(q),'_blank','noopener,noreferrer'); e.target.value='';} } });
    document.getElementById('top-search-btn').addEventListener('click', () => { const q=document.getElementById('top-search').value.trim(); if(q){window.open('https://duckduckgo.com/?q='+encodeURIComponent(q),'_blank','noopener,noreferrer'); document.getElementById('top-search').value='';} });

    const handler = { onDataChanged(data) { allData = data; limitEl.classList.toggle('hidden', data.length < 999); renderEntries(); } };
    (async () => { await window.dataSdk.init(handler); lucide.createIcons(); })();
  </script>
